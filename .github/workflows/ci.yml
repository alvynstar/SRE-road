name: CI

# Trigger this workflow on:
# - Any pull request (so PRs are gated)
# - Pushes to main (so direct commits are still validated)
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint and test Flask app
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 01-observability/app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            01-observability/app/requirements.txt
            01-observability/app/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests with pytest
        run: pytest -v

  docker-build-push:
    name: Build and push Flask image to GHCR
    needs: lint-and-test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/alvynstar/sre-lab-app
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and push on main) Flask image
        uses: docker/build-push-action@v6
        with:
          context: 01-observability/app
          file: 01-observability/app/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
